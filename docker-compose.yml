services:
  app1:
    build: ./app
    environment:
      INSTANCE_NAME: app1
      HTTP_PORT: 8080
      GRPC_PORT: 50051

  app2:
    build: ./app
    environment:
      INSTANCE_NAME: app2
      HTTP_PORT: 8080
      GRPC_PORT: 50051

  app3:
    build: ./app
    environment:
      INSTANCE_NAME: app3
      HTTP_PORT: 8080
      GRPC_PORT: 50051

  nginx:
    image: nginx:1.27
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
      - "8081:81"
    depends_on:
      - app1
      - app2
      - app3

  haproxy:
    image: haproxy:3.0
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "19000:9000"
      - "19001:9001"
    depends_on:
      - app1
      - app2
      - app3

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - app1
      - app2
      - app3

  grafana:
    image: grafana/grafana:11.1.4
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  toolbox:
    build:
      context: ./tools
    container_name: load-balancer-lab-toolbox
    stdin_open: true
    tty: true
    command: ["sleep", "infinity"]
    volumes:
      - ./app:/workspace/app:ro
    depends_on:
      - nginx
      - haproxy
      - prometheus
